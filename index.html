<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Chela+One&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
	    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
		<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

		<title>Descargador de musica de youtube</title>

		<style type="text/css">
			h4 { font-family: 'Chela One', cursive; }

			/* Fluid title — never overflows on narrow screens */
			.yt-title {
				font-size: clamp(1.2rem, 5.5vw, 2rem);
				white-space: nowrap;
			}
			.large-letter-y { font-size: 1.6em; line-height: 1; }
			.large-letter-t { font-size: 1.3em; line-height: 1; }
			.text-ube, .text-ou { margin-left: -3px; }

			.youtube-icon-red { color: red; }

			.progressbardiv { display: none; }

			/* Thumbnail caps at a reasonable size on wide screens */
			.video-thumb { width: 100%; border-radius: 4px; }

			/* ── Skeleton / shimmer loading ── */
			.skeleton {
				background: #e0e0e0;
				border-radius: 4px;
				position: relative;
				overflow: hidden;
			}
			.skeleton::after {
				content: '';
				position: absolute;
				inset: 0;
				background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.6) 50%, transparent 100%);
				animation: shimmer 1.4s infinite;
			}
			@keyframes shimmer {
				0%   { transform: translateX(-100%); }
				100% { transform: translateX(100%); }
			}
			.skeleton-thumb  { width: 100%; aspect-ratio: 16/9; border-radius: 4px; }
			.skeleton-line   { height: 12px; margin-bottom: 8px; }
			.skeleton-line.short { width: 60%; }
			.skeleton-btn    { height: 30px; width: 80px; border-radius: 4px; display: inline-block; }
		</style>

		<script>
			function download(downloadDirectly = false, selectedMusic = false, selectedVideo = false, id = '', index = '')
			{
				if(!downloadDirectly)
				{
					id = $('#videoId').val();
					selectedMusic = document.getElementById('typeDownload1').checked;
					selectedVideo = document.getElementById('typeDownload2').checked;
				}

				if(id.includes('youtube'))
				{
					id = id.split('v=')[1];
					id = id.split('&')[0];
				}

				var canDownload = true;
				const settings = {
					async: true,
					crossDomain: true,
					url: 'https://tiktok-video-no-watermark2.p.rapidapi.com/?url=' + id,
					method: 'GET',
					headers: {
						'x-rapidapi-key': '4e5754d9ddmshacf67f86991a8ccp18c8dajsn6d8052741dd0',
						'x-rapidapi-host': 'tiktok-video-no-watermark2.p.rapidapi.com',
						'Content-Type': 'application/json'
					}
				};

				if(true)
				{
					console.log(settings);
					$.ajax(settings).done(function (response)
					{
						console.log(response);

						if(response.code == 403)
						{
							alert('El enlace de Tiktok es incorrecto.');
							return;
						}

						if(selectedMusic)
						{
							if(response.status == 'processing')
							{
								document.getElementById('progress' + index).innerText = response.title + ' ' + response.progress+'%';
								document.getElementById('progress-bar' + index).style.width = response.progress+'%';
								document.getElementById('progressbardiv' + index).style.display = 'block';
							}
							else
							{
								document.getElementById('progress' + index).innerText = '';
								document.getElementById('progressbardiv' + index).style.display = 'block';
								window.open(response.link);
							}
						}
						else
						{
							window.open(response.data.play);
						}
					});
				}
			}

			function secondsToMinutes(seconds) {
			  	const minutes = Math.floor(seconds / 60);
			  	const remainingSeconds = seconds % 60;
			  	return `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
			}

			function drawVideoObj(object, index, fromChannel = false)
			{
				var views = 0;
				var videoUrl = 'https://www.youtube.com/watch?v=' + object.videoId;
				if(object.stats) views = object.stats.views;
				var author = 'Video';
				if(!fromChannel) author = object.author.title;

				var html = '<div class="col-12 col-md-6 mb-3">'
					+ '<div class="row g-2">'
						+ '<div class="col-4">'
							+ '<a href="' + videoUrl + '" target="_blank">'
								+ '<img src="' + object.thumbnails[0].url + '" class="video-thumb">'
							+ '</a>'
						+ '</div>'
						+ '<div class="col-8">'
							+ '<p class="mb-1 small fw-semibold lh-sm">'
								+ '<a href="' + videoUrl + '" target="_blank" class="text-decoration-none text-dark">'
									+ object.title
								+ '</a>'
							+ '</p>'
							+ '<p class="mb-2 text-muted" style="font-size:0.75rem;">'
								+ author + ' &bull; ' + views + ' vistas &bull; ' + secondsToMinutes(object.lengthSeconds)
							+ '</p>'
							+ '<div class="d-flex flex-wrap gap-1">'
								+ '<button class="btn btn-success btn-sm" onclick="download(true, true, false, \'' + videoUrl + '\', ' + index + ');"><i class="fas fa-music"></i> Música</button>'
								+ '<button class="btn btn-success btn-sm" onclick="download(true, false, true, \'' + videoUrl + '\');"><i class="fas fa-film"></i> Video</button>'
							+ '</div>'
						+ '</div>'
					+ '</div>'
					+ '<div class="row mt-1">'
						+ '<div class="col-4"></div>'
						+ '<div class="col-8 progressbardiv" id="progressbardiv' + index + '">'
							+ '<div class="progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">'
							  	+ '<div class="progress-bar" id="progress-bar' + index + '" style="width: 0%"></div>'
							+ '</div>'
							+ '<div class="text-center small mt-1" id="progress' + index + '"></div>'
						+ '</div>'
					+ '</div>'
				+ '</div>';

				document.getElementById('videos').innerHTML += html;
			}

			function showSkeletons(count) {
				var html = '';
				for (var i = 0; i < count; i++) {
					html += '<div class="col-12 col-md-6 mb-3">'
						+ '<div class="row g-2">'
							+ '<div class="col-4"><div class="skeleton skeleton-thumb"></div></div>'
							+ '<div class="col-8">'
								+ '<div class="skeleton skeleton-line" style="width:90%"></div>'
								+ '<div class="skeleton skeleton-line" style="width:70%"></div>'
								+ '<div class="skeleton skeleton-line short"></div>'
								+ '<div class="d-flex gap-1 mt-2">'
									+ '<div class="skeleton skeleton-btn"></div>'
									+ '<div class="skeleton skeleton-btn"></div>'
								+ '</div>'
							+ '</div>'
						+ '</div>'
					+ '</div>';
				}
				document.getElementById('videos').innerHTML = html;
			}

			function search()
			{
				var searchString = $('#searchString').val();
				showSkeletons(6);

				const settings = {
					async: true,
					crossDomain: true,
					url: 'https://youtube138.p.rapidapi.com/search/?q=' + searchString,
					method: 'GET',
					headers: {
						'x-rapidapi-key': '4e5754d9ddmshacf67f86991a8ccp18c8dajsn6d8052741dd0',
						'x-rapidapi-host': 'youtube138.p.rapidapi.com'
					}
				};

				$.ajax(settings).done(function (response) {
					document.getElementById('videos').innerHTML = '';
					for(var i = 0; i < response.contents.length; i++)
					{
						if(response.contents[i].type == 'video')
						drawVideoObj(response.contents[i].video, i);
					}
				});
			}

			function searchChannelVideos()
			{
				var searchString = $('#searchString').val();
				showSkeletons(6);

				const settingsChannel = {
					async: true,
					crossDomain: true,
					url: 'https://youtube138.p.rapidapi.com/search/?q=' + searchString,
					method: 'GET',
					headers: {
						'x-rapidapi-key': '4e5754d9ddmshacf67f86991a8ccp18c8dajsn6d8052741dd0',
						'x-rapidapi-host': 'youtube138.p.rapidapi.com'
					}
				};

				$.ajax(settingsChannel).done(function (responseChannel) {
					document.getElementById('videos').innerHTML = '';
					for(var i = 0; i < responseChannel.contents.length; i++)
					{
						if(responseChannel.contents[i].type == 'channel')
						{
							const settings = {
								async: true,
								crossDomain: true,
								url: 'https://youtube138.p.rapidapi.com/channel/videos/?id=' + responseChannel.contents[i].channel.channelId + '&filter=videos_latest',
								method: 'GET',
								headers: {
									'x-rapidapi-key': '4e5754d9ddmshacf67f86991a8ccp18c8dajsn6d8052741dd0',
									'x-rapidapi-host': 'youtube138.p.rapidapi.com'
								}
							};

							$.ajax(settings).done(function (response) {
								document.getElementById('videos').innerHTML = '';
								for(var i = 0; i < response.contents.length; i++)
								{
									if(response.contents[i].type == 'video')
									drawVideoObj(response.contents[i].video, i, true);
								}
							});

							break;
						}
					}
				});
			}

			function initScript()
			{
				document.getElementById("searchString").addEventListener("keypress", function(event) {
				  	if (event.key === "Enter") search();
				});
			}
		</script>
	</head>
	<body onload="initScript();">
		<div class="container py-4">

			<!-- ── Title ── -->
			<div class="text-center mb-4">
				<h3 class="yt-title d-inline-flex align-items-baseline flex-wrap justify-content-center mb-0">
					Convertidor&nbsp;de&nbsp;videos&nbsp;
					<span class="large-letter-y">Y</span><span class="text-ou">ou</span><span class="large-letter-t">T</span><span class="text-ube">ube</span><i class="fab fa-youtube ms-1 youtube-icon-red"></i>&nbsp;Mp3
				</h3>
				<h4 class="mt-1 mb-0">Facil y rapido</h4>
			</div>

			<!-- ── Search panel ── -->
			<div class="p-3 mb-4 bg-white rounded border border-black">

				<div class="input-group mb-3 border border-black">
					<span class="input-group-text"><i class="fab fa-youtube youtube-icon-red border border-black"></i></span>
					<input type="text" class="form-control" id="searchString" placeholder="Ingrese el texto">
				</div>

				<!-- d-grid = full-width stacked on mobile; d-sm-flex = side-by-side from sm up -->
				<div class="d-grid d-sm-flex gap-2 mb-3">
					<button class="btn btn-success btn-lg" onclick="search()">
						<i class="fas fa-search"></i> Buscar
					</button>
					<button class="btn btn-success btn-lg" onclick="searchChannelVideos()">
						<i class="fas fa-search"></i> Buscar en canal
					</button>
				</div>

				<div class="row" id="videos"></div>
			</div>

			<!-- ── Direct-URL download panel ── -->
			<div class="p-3 mb-4 bg-white rounded border border-black">
				<h6 class="fw-bold mb-3">Descargar por URL directa</h6>

				<div class="input-group mb-3 border border-black">
					<span class="input-group-text"><i class="fab fa-youtube youtube-icon-red border border-black"></i></span>
					<input type="text" class="form-control" id="videoId" placeholder="Ingrese la dirección URL del video">
				</div>

				<p class="mb-2 fw-semibold">Descargar como:</p>
				<div class="d-flex gap-4 mb-3">
					<div class="form-check">
						<input class="form-check-input" type="radio" name="typeDownload" id="typeDownload1">
						<label class="form-check-label" for="typeDownload1">Música</label>
					</div>
					<div class="form-check">
						<input class="form-check-input" type="radio" name="typeDownload" id="typeDownload2">
						<label class="form-check-label" for="typeDownload2">Video</label>
					</div>
				</div>

				<!-- Full-width button on mobile only -->
				<div class="d-grid d-sm-block">
					<button class="btn btn-success btn-lg" onclick="download()">
						<i class="fas fa-download"></i> Descargar
					</button>
				</div>
			</div>

		</div>
	</body>
</html>
