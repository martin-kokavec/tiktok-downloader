<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Loop Opener</title>
<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 700px;
        margin: 40px auto;
        padding: 20px;
    }

    textarea {
        width: 100%;
        height: 250px;
        font-size: 14px;
        margin-bottom: 15px;
    }

    button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
    }

    #status {
        margin-top: 15px;
        color: green;
    }
</style>
</head>
<body>

<h2>Pon Tiktok videos enlaces</h2>

<textarea id="urls" placeholder=""></textarea>

<br>
<button id="start">Confirmar</button>

<div id="status"></div>

<script>
let timer = null;
let index = 0;
let urls = [];

document.getElementById("start").addEventListener("click", () => {
    urls = document.getElementById("urls").value
        .split("\n")
        .map(u => u.trim())
        .filter(u => u.length);

    if (urls.length === 0) {
        alert("Please enter at least one URL.");
        return;
    }

    if (timer) {
        clearInterval(timer);
    }

    index = 0;

    function openNext() {
        window.open(urls[index], "_blank");
        index = (index + 1) % urls.length;
    }

    // Open first immediately
    openNext();

    // Then every 30 seconds
    timer = setInterval(openNext, 30000);

    document.getElementById("status").textContent =
        `Running... Opening ${urls.length} URLs every 30 seconds.`;
});
</script>

</body>
</html>
